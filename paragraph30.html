<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тест: Гідростатичний тиск</title>
    <!-- Favicon using Emoji -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
        
        :root {
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            background: linear-gradient(180deg, #f0f9ff 0%, #bae6fd 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Optimized Mobile Background */
        .bubble {
            position: fixed; 
            bottom: -50px; 
            background: rgba(255, 255, 255, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: float 12s infinite linear; 
            z-index: -1;
            will-change: transform;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* Mobile-friendly Controls */
        .checkbox-custom:checked + label { 
            background-color: #2563eb; 
            color: white; 
            border-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Disable text selection during test */
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="safe-area-bottom">

    <div id="bubbles-container"></div>

    <div id="app" class="max-w-xl mx-auto px-4 pt-4 pb-20">
        
        <!-- Header -->
        <header class="glass-card rounded-[2rem] p-6 mb-6 text-center fade-in">
            <div class="inline-flex p-3 bg-blue-600/10 rounded-2xl mb-3">
                <span class="text-3xl">🌊</span>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 leading-tight">Гідростатичний тиск</h1>
            <p class="text-blue-600 font-bold text-[10px] uppercase tracking-[0.25em] mt-1">Фізика • 7 клас</p>
        </header>

        <!-- Quiz Container -->
        <div id="quiz-screen" class="space-y-4 fade-in no-select">
            <div id="questions-list" class="space-y-4"></div>

            <div class="pt-6" id="submit-container">
                <button onclick="quiz.submitAll()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-5 rounded-2xl shadow-lg active:scale-95 transition-all text-lg uppercase tracking-wider flex items-center justify-center gap-3">
                    <span>Перевірити тест</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>

        <!-- Mobile-friendly Results -->
        <div id="result-screen" class="hidden glass-card rounded-[2.5rem] p-8 text-center fade-in border-2 border-blue-100 shadow-2xl">
            <h2 class="text-xl font-bold text-slate-700 mb-6">Ваш результат</h2>
            <div class="inline-flex items-center justify-center w-44 h-44 rounded-full border-[10px] border-white bg-blue-50 shadow-inner mb-6 relative">
                <span id="grade-display" class="text-7xl font-black text-blue-600">0</span>
                <div class="absolute -bottom-2 bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-extrabold uppercase tracking-widest shadow-md">БАЛІВ</div>
            </div>
            <p id="final-score-text" class="text-slate-500 font-semibold text-base mb-8"></p>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold active:scale-95 transition-all shadow-xl">
                🔄 Спробувати ще раз
            </button>
        </div>

    </div>

    <script>
        const questions = [
            { q: "У чому головна причина виникнення тиску всередині рідини?", options: ["Вага шарів рідини, що лежать вище", "Безперервний хаотичний рух молекул", "Сила тертя між шарами", "Наявність атмосферного тиску"], correct: [0, 1] },
            { q: "Яка формула використовується для обчислення гідростатичного тиску?", options: ["p = F / S", "p = ρgh", "F = mg", "p = m / V"], correct: [1] },
            { q: "Як змінюється тиск у рідині, якщо збільшити глибину занурення?", options: ["Збільшиться", "Зменшується", "Не зміниться", "Зникне зовсім"], correct: [0] },
            { q: "Від чого ЗАЛЕЖИТЬ тиск нерухомої рідини на дно посудини?", options: ["Від густини рідини", "Від глибини (висоти стовпа)", "Від форми посудини", "Від площі дна"], correct: [0, 1] },
            { q: "Дослід Паскаля з тонкою трубкою довів, що:", options: ["Вода не стискається", "Тиск залежить від висоти стовпа", "Тиск не залежить від форми посудини", "Бочка була дірява"], correct: [1, 2] },
            { q: "Тиск усередині нерухомої рідини на одному рівні:", options: ["Завжди однаковий", "Більший біля стінок", "Менший в центрі", "Залежить від ширини посудини"], correct: [0] },
            { q: "Одиниця вимірювання тиску в системі СІ:", options: ["Ньютон", "Паскаль", "Кілограм", "Джоуль"], correct: [1] },
            { q: "Тиск усередині рідини передається:", options: ["Тільки вниз", "Тільки на стінки", "В усіх напрямках однаково", "Тільки вгору"], correct: [2] },
            { q: "Де тиск на глибині 1 м буде більшим: у морі чи в річці?", options: ["У морі (солона вода густіша)", "У річці", "Тиск однаковий", "Залежить від погоди"], correct: [0] },
            { q: "Прилад для вимірювання тиску всередині рідин:", options: ["Барометр", "Рідинний манометр", "Спідометр", "Термометр"], correct: [1] },
            { q: "Якщо налити ртуть та воду на однакову висоту, де тиск на дно більший?", options: ["У ртуті (густина 13600 кг/м³)", "У воді (густина 1000 кг/м³)", "Однаковий", "Тиску не буде"], correct: [0] },
            { q: "Чи залежить гідростатичний тиск від маси всієї рідини в посудині?", options: ["Ні, тільки від густини та висоти стовпа", "Так, чим більше літрів, тим більший тиск", "Залежить тільки від температури", "Залежить від кольору рідини"], correct: [0] }
        ];

        class Quiz {
            constructor() {
                this.init();
                this.createBubbles();
            }

            createBubbles() {
                const container = document.getElementById('bubbles-container');
                const count = window.innerWidth < 600 ? 10 : 20;
                for (let i = 0; i < count; i++) {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    const size = Math.random() * 30 + 10;
                    bubble.style.width = `${size}px`;
                    bubble.style.height = `${size}px`;
                    bubble.style.left = `${Math.random() * 100}vw`;
                    bubble.style.animationDelay = `${Math.random() * 12}s`;
                    bubble.style.animationDuration = `${Math.random() * 8 + 8}s`;
                    container.appendChild(bubble);
                }
            }

            init() {
                const list = document.getElementById('questions-list');
                list.innerHTML = questions.map((q, qIdx) => `
                    <div id="q-container-${qIdx}" class="glass-card rounded-[2rem] p-6 transition-all duration-500 relative overflow-hidden">
                        <div class="flex items-start gap-3 mb-5">
                            <span class="bg-blue-600 text-white w-8 h-8 rounded-2xl flex-shrink-0 flex items-center justify-center text-sm font-black shadow-lg shadow-blue-200">${qIdx + 1}</span>
                            <h3 class="font-bold text-slate-800 leading-snug text-[15px] pt-1">${q.q}</h3>
                        </div>
                        <div class="grid gap-2.5">
                            ${q.options.map((opt, oIdx) => `
                                <div class="relative">
                                    <input type="checkbox" name="q${qIdx}" id="q${qIdx}o${oIdx}" value="${oIdx}" class="hidden checkbox-custom">
                                    <label for="q${qIdx}o${oIdx}" class="block p-4 border-2 border-slate-100 rounded-2xl cursor-pointer font-semibold text-slate-600 text-sm transition-all active:scale-[0.97]">
                                        ${opt}
                                    </label>
                                </div>
                            `).join('')}
                        </div>
                        <div id="feedback-${qIdx}" class="mt-4 p-4 rounded-2xl hidden text-xs font-bold border-2 animate-pulse"></div>
                    </div>
                `).join('');
            }

            submitAll() {
                let correctCount = 0;
                questions.forEach((q, qIdx) => {
                    const selected = Array.from(document.querySelectorAll(`input[name="q${qIdx}"]:checked`)).map(i => parseInt(i.value));
                    const isCorrect = selected.length === q.correct.length && selected.every(v => q.correct.includes(v));
                    
                    if (isCorrect) correctCount++;

                    const container = document.getElementById(`q-container-${qIdx}`);
                    const feedback = document.getElementById(`feedback-${qIdx}`);
                    
                    document.querySelectorAll(`input[name="q${qIdx}"]`).forEach(input => input.disabled = true);
                    
                    if (isCorrect) {
                        container.style.borderColor = '#4ade80';
                        container.style.background = 'rgba(240, 253, 244, 0.9)';
                        feedback.classList.remove('hidden');
                        feedback.classList.add('bg-green-100', 'text-green-700', 'border-green-200');
                        feedback.innerHTML = "✅ ПРАВИЛЬНО";
                    } else {
                        container.style.borderColor = '#f87171';
                        container.style.background = 'rgba(254, 242, 242, 0.9)';
                        feedback.classList.remove('hidden');
                        feedback.classList.add('bg-red-100', 'text-red-700', 'border-red-200');
                        const correctTexts = q.correct.map(idx => q.options[idx]).join(' та ');
                        feedback.innerHTML = `❌ ВІРНО: ${correctTexts}`;
                    }
                });

                const grade = Math.round((correctCount / questions.length) * 12);
                
                document.getElementById('submit-container').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('grade-display').innerText = grade;
                document.getElementById('final-score-text').innerText = `Вірно: ${correctCount} з ${questions.length}`;
                
                document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });
            }
        }

        window.onload = () => {
            window.quiz = new Quiz();
        };
    </script>
</body>
</html>
