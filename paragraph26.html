<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка знань: § 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .progress-bar { transition: width 0.5s ease-in-out; }
        .timer-ring { transition: stroke-dashoffset 1s linear; }
        .opt-btn {
            font-size: 1.25rem;
            line-height: 1.75rem;
        }
        @keyframes wink {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }
        .eye-wink {
            animation: wink 3s infinite;
            transform-origin: center;
        }
        .smile-float {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-start p-2 md:p-6">

    <div id="app" class="w-full bg-white rounded-xl shadow-2xl overflow-hidden border border-slate-200 min-h-[90vh] flex flex-col">
        
        <!-- Start Screen -->
        <div id="start-screen" class="flex-grow flex flex-col items-center justify-center text-center p-6 md:p-12">
            <div class="smile-float mb-6">
                <svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#FFD93D" stroke="#000" stroke-width="2"/>
                    <circle cx="35" cy="40" r="5" fill="#000" class="eye-wink"/>
                    <circle cx="65" cy="40" r="5" fill="#000"/>
                    <path d="M30 65C30 65 40 75 50 75C60 75 70 65 70 65" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </div>
            
            <h1 class="text-4xl md:text-7xl font-black text-slate-800 mb-8 tracking-tight leading-tight">
                Як ти опрацював(-ла)<br>контрольні запитання?
            </h1>
            
            <p class="text-xl md:text-3xl text-slate-600 mb-12 max-w-4xl leading-relaxed">
                Перевірмо твої знання за матеріалом <strong>§ 26 (Сила тертя)</strong>. <br>
                12 запитань, по 20 секунд на кожне!
            </p>
            
            <button onclick="quiz.start()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-6 px-16 rounded-full text-3xl transition-all transform hover:scale-105 active:scale-95 shadow-2xl">
                ПОЧАТИ
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden flex-grow flex flex-col p-4 md:p-10">
            <div class="flex justify-between items-center mb-8">
                <span id="question-counter" class="text-xl md:text-3xl font-bold text-blue-700 bg-blue-50 px-6 py-3 rounded-2xl border-2 border-blue-100">Запитання 1/12</span>
                <div class="relative w-20 h-20 md:w-28 md:h-28">
                    <svg class="w-full h-full transform -rotate-90">
                        <circle cx="50%" cy="50%" r="40%" stroke="currentColor" stroke-width="10" fill="transparent" class="text-slate-100" />
                        <circle id="timer-circle" cx="50%" cy="50%" r="40%" stroke="currentColor" stroke-width="10" fill="transparent" stroke-dasharray="251.2" stroke-dashoffset="0" class="text-blue-600 timer-ring" />
                    </svg>
                    <span id="timer-text" class="absolute inset-0 flex items-center justify-center text-2xl md:text-4xl font-black text-slate-800">20</span>
                </div>
            </div>

            <div class="flex-grow flex flex-col justify-center max-w-6xl mx-auto w-full">
                <h2 id="question-text" class="text-2xl md:text-5xl font-extrabold text-slate-800 mb-12 text-center leading-tight">Завантаження...</h2>
                <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-8">
                    <!-- Options injected here -->
                </div>
            </div>

            <div class="mt-12">
                <div class="w-full bg-slate-100 h-6 rounded-full overflow-hidden shadow-inner border border-slate-200">
                    <div id="progress-bar" class="bg-blue-600 h-full progress-bar shadow-[0_0_15px_rgba(37,99,235,0.4)]" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden flex-grow flex flex-col items-center justify-center text-center p-6 md:p-12">
            <div class="mb-6">
                <svg width="150" height="150" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#FFD93D" stroke="#000" stroke-width="2"/>
                    <circle cx="35" cy="40" r="5" fill="#000"/>
                    <circle cx="65" cy="40" r="5" fill="#000"/>
                    <circle cx="50" cy="70" r="15" fill="#000"/>
                    <rect x="35" y="60" width="30" height="10" fill="#FFD93D"/>
                </svg>
            </div>
            <h2 class="text-4xl md:text-6xl font-black text-slate-800 mb-4">Твій результат</h2>
            <div id="score-circle" class="text-9xl md:text-[12rem] font-black text-blue-600 my-12 animate-bounce">0%</div>
            <p id="result-message" class="text-2xl md:text-4xl text-slate-700 mb-14 max-w-4xl font-semibold leading-snug"></p>
            <button onclick="location.reload()" class="bg-slate-900 hover:bg-black text-white font-bold py-6 px-16 rounded-full text-3xl transition-all shadow-2xl transform hover:scale-105">
                Спробувати ще раз
            </button>
        </div>
    </div>

    <script>
        const questions = [
            // 1. Які види тертя ви знаєте?
            { q: "Який із перелічених видів тертя виникає, коли ми намагаємося зрушити важку шафу, але вона не рухається?", a: ["Тертя ковзання", "Тертя спокою", "Тертя кочення", "В'язке тертя"], c: 1 },
            { q: "Виберіть три основні види сухого тертя:", a: ["Ковзання, спокою, кочення", "Водне, повітряне, тверде", "Магнітне, гравітаційне, ядерне", "Швидке, повільне, середнє"], c: 0 },
            
            // 2. Чому силу тертя спокою називають рушійною силою?
            { q: "Завдяки якій силі людина може відштовхнутися від поверхні землі під час ходьби?", a: ["Силі тяжіння", "Силі пружності", "Силі тертя спокою", "Силі тертя ковзання"], c: 2 },
            { q: "Що є причиною руху автомобіля (відштовхування коліс від дороги)?", a: ["Сила тертя спокою між шиною та дорогою", "Тільки робота двигуна у вакуумі", "Сила опору повітря", "Сила тертя ковзання"], c: 0 },
            
            // 3. Коли виникає сила тертя ковзання та від яких чинників вона залежить?
            { q: "Сила тертя ковзання виникає при...", a: ["Спробі зрушити тіло", "Русі одного тіла по поверхні іншого", "Коченні колеса без проковзування", "Перебуванні тіла в стані спокою"], c: 1 },
            { q: "Від чого безпосередньо залежить модуль сили тертя ковзання?", a: ["Від площі поверхонь, що труться", "Від сили нормальної реакції опори", "Від кольору тіла", "Від об'єму тіла"], c: 1 },
            
            // 4. Від чого залежить коефіцієнт тертя ковзання?
            { q: "Коефіцієнт тертя ковзання (μ) залежить від:", a: ["Маси тіла", "Швидкості руху", "Матеріалів та стану обробки поверхонь", "Кута нахилу поверхні"], c: 2 },
            { q: "Якщо поверхню зробити більш шорсткою, як зміниться коефіцієнт тертя?", a: ["Збільшиться", "Зменшиться", "Не зміниться", "Стане рівним нулю"], c: 0 },
            
            // 5. Чому виникає сила тертя ковзання? Як її можна зменшити?
            { q: "Яка основна мікроскопічна причина виникнення тертя?", a: ["Тільки магнітні бурі", "Шорсткість поверхонь та взаємодія молекул", "Наявність повітря", "Гравітаційне притягання частинок"], c: 1 },
            { q: "Який спосіб є найефективнішим для зменшення тертя в підшипниках?", a: ["Збільшення навантаження", "Використання мастила", "Збільшення шорсткості", "Нагрівання поверхонь"], c: 1 },
            
            // 6. Чому кругле тіло котити легше, ніж тягти?
            { q: "Порівняйте силу тертя ковзання та силу тертя кочення за однакових умов:", a: ["Вони однакові", "Тертя ковзання значно більше за тертя кочення", "Тертя кочення завжди більше", "Тертя кочення не існує"], c: 1 },
            { q: "Чому перекочування колоди легше за її волочіння?", a: ["Тому що тертя кочення значно менше", "Через зміну сили тяжіння", "Тому що повітря допомагає коченню", "Через відсутність тиску на землю"], c: 0 }
        ];

        class Quiz {
            constructor() {
                this.currentIdx = 0;
                this.score = 0;
                this.timeLeft = 20;
                this.timer = null;
                this.audioCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
                this.audioWrong = new Audio('https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3');
            }

            start() {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                this.showQuestion();
            }

            showQuestion() {
                const q = questions[this.currentIdx];
                document.getElementById('question-counter').innerText = `Запитання ${this.currentIdx + 1}/${questions.length}`;
                document.getElementById('question-text').innerText = q.q;
                
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                q.a.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "opt-btn w-full text-left p-6 md:p-8 rounded-3xl border-4 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-extrabold text-slate-700 active:bg-blue-100 shadow-sm hover:shadow-xl text-xl md:text-2xl";
                    btn.innerText = opt;
                    btn.onclick = () => this.handleAnswer(i);
                    container.appendChild(btn);
                });

                this.resetTimer();
                this.updateProgress();
            }

            resetTimer() {
                clearInterval(this.timer);
                this.timeLeft = 20;
                this.updateTimerUI();
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerUI();
                    if (this.timeLeft <= 0) this.handleAnswer(-1);
                }, 1000);
            }

            updateTimerUI() {
                document.getElementById('timer-text').innerText = this.timeLeft;
                const circle = document.getElementById('timer-circle');
                const offset = 251.2 - (this.timeLeft / 20) * 251.2;
                circle.style.strokeDashoffset = offset;
                if (this.timeLeft <= 5) circle.classList.replace('text-blue-600', 'text-red-600');
                else circle.classList.replace('text-red-600', 'text-blue-600');
            }

            updateProgress() {
                const progress = (this.currentIdx / questions.length) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
            }

            handleAnswer(idx) {
                clearInterval(this.timer);
                const q = questions[this.currentIdx];
                const buttons = document.getElementById('options-container').children;

                for (let btn of buttons) btn.disabled = true;

                if (idx === q.c) {
                    this.score++;
                    this.audioCorrect.play().catch(() => {});
                    if (idx !== -1) buttons[idx].classList.add('bg-green-100', 'border-green-600', 'text-green-900', 'scale-[1.03]');
                } else {
                    this.audioWrong.play().catch(() => {});
                    if (idx !== -1) buttons[idx].classList.add('bg-red-100', 'border-red-600', 'text-red-900');
                    buttons[q.c].classList.add('bg-green-100', 'border-green-600', 'text-green-900');
                }

                setTimeout(() => {
                    this.currentIdx++;
                    if (this.currentIdx < questions.length) this.showQuestion();
                    else this.showResults();
                }, 1500);
            }

            showResults() {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('results-screen').classList.remove('hidden');
                const percentage = Math.round((this.score / questions.length) * 100);
                document.getElementById('score-circle').innerText = `${percentage}%`;
                
                let msg = percentage === 100 ? "Неймовірно! Ти ідеально знаєш сили тертя!" :
                          percentage >= 75 ? "Чудово! Ти дуже добре опрацював(-ла) § 26." :
                          percentage >= 50 ? "Добре, але деякі види тертя варто повторити." :
                          "Сили тертя виявилися сильнішими... Перечитай § 26 ще раз!";
                
                document.getElementById('result-message').innerText = msg;
            }
        }

        const quiz = new Quiz();
    </script>
</body>
</html>
